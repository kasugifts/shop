  <script>
    // ── SUPABASE CONNECTION & SDK INIT ──
    const SB_URL = 'https://aawhuykfhjsjtwrstnvt.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhd2h1eWtmaGpzanR3cnN0bnZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTAxMDQsImV4cCI6MjA4ODI2NjEwNH0.6EE9pY3rFBmvgs6c5hHQ4WMnHp8XIm-dV9V-J2129sk';

    // Initialize the JS Client
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    // Alert if not on a server
    if (window.location.protocol === 'file:') {
      alert("⚠️ Google Login will not work when opening the file directly (file://). Please use a local server or upload it to your website.");
    }

    // REST function (for custom database table logic)
    async function sb(path, method = 'GET', body = null) {
      const h = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };
      if (method === 'POST') h['Prefer'] = 'return=representation';
      if (method === 'PATCH') h['Prefer'] = 'return=minimal';
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 8000);
      try {
        const r = await fetch(`${SB_URL}/rest/v1/${path}`, { method, headers: h, signal: ctrl.signal, body: body ? JSON.stringify(body) : undefined });
        clearTimeout(tid);
        const txt = await r.text();
        if (!r.ok) throw new Error(txt);
        return txt ? JSON.parse(txt) : [];
      } catch (e) { clearTimeout(tid); throw e; }
    }

    function showToast(msg) {
      const t = document.getElementById('toast'); 
      t.textContent = msg; 
      t.classList.add('show'); 
      setTimeout(() => t.classList.remove('show'), 4000);
    }

    function throwErr(inputId, errId) {
      document.getElementById(inputId).classList.add('err');
      document.getElementById(errId).classList.add('show');
    }

    function clearErr(el) {
      el.classList.remove('err');
      const errBox = document.getElementById('err-' + el.id);
      if(errBox) errBox.classList.remove('show');
    }

    // ── AUTH LOGIC ──

    // Listen for Google Auth Redirects Automatically
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        const user = session.user;
        const email = user.email;
        let name = user.user_metadata?.full_name || email.split('@')[0];

        try {
          // Check if Google user already exists in custom affiliates table
          const users = await sb(`affiliates?email=eq.${email}&select=*`);
          let affiliateData;
          
          if (users.length > 0) {
            // Already registered
            affiliateData = { name: users[0].name, email: users[0].email, code: users[0].code };
          } else {
            // New User - Generate a unique code
            let baseName = name.replace(/[^a-zA-Z0-9]/g, '').substring(0, 6).toUpperCase();
            let randomStr = Math.random().toString(36).substring(2, 5).toUpperCase();
            let newCode = `${baseName}${randomStr}`;
            
            const newUser = { name, email, password: 'google-oauth-user', code: newCode };
            await sb('affiliates', 'POST', newUser);
            
            affiliateData = { name, email, code: newCode };
          }
          
          localStorage.setItem('kasu_affiliate_user', JSON.stringify(affiliateData));
          checkAuth();
          
          // Clean the URL
          if (window.history.replaceState) {
            window.history.replaceState(null, null, window.location.pathname);
          }
        } catch (e) {
          showToast('⚠️ Could not sync account.');
          console.error(e);
        }
      }
    });

    // Trigger Google Auth
    async function handleGoogleLogin() {
      // Show loading state instantly
      showToast('🔄 Connecting to Google...');
      
      if (window.location.protocol === 'file:') {
        showToast('⚠️ Google Auth blocked. Must run on a live website.');
        return;
      }
      
      // Force exact redirect URL back to the page
      const redirectURL = window.location.origin + window.location.pathname;

      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: redirectURL 
        }
      });
      
      if (error) {
        // This will print the EXACT reason it is failing to your screen!
        console.error("Google Auth Error:", error.message);
        showToast('⚠️ Error: ' + error.message);
      }
    }

    function checkAuth() {
      const userStr = localStorage.getItem('kasu_affiliate_user');
      if (userStr) {
        const user = JSON.parse(userStr);
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('dashboard-section').style.display = 'block';
        
        document.getElementById('dash-name').textContent = user.name.split(' ')[0]; // Show first name
        document.getElementById('dash-code').textContent = user.code;
        
        // Build link dynamically
        const baseUrl = window.location.origin + window.location.pathname.replace('affiliate.html', 'index.html');
        document.getElementById('dash-link').textContent = `${baseUrl}?ref=${user.code}`;
        
        loadDashboardStats(user.code);
      } else {
        document.getElementById('auth-section').style.display = 'block';
        document.getElementById('dashboard-section').style.display = 'none';
      }
    }

    async function logout() {
      localStorage.removeItem('kasu_affiliate_user');
      await supabase.auth.signOut(); // Ensure Google session is wiped
      checkAuth();
      showToast('Logged out successfully.');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function copyLink() {
      const link = document.getElementById('dash-link').textContent;
      navigator.clipboard.writeText(link).then(() => showToast('✅ Link copied to clipboard!'));
    }

    // ── DASHBOARD & PAYOUT LOGIC ──

    async function loadDashboardStats(userCode) {
      try {
        const orders = await sb(`orders?affiliate_code=eq.${userCode}&select=affiliate_commission`);
        
        let totalSales = orders.length;
        let totalEarnings = 0;
        
        orders.forEach(order => {
           totalEarnings += (Number(order.affiliate_commission) || 0);
        });

        document.getElementById('stat-sales').textContent = totalSales;
        document.getElementById('stat-earnings').textContent = '₹' + totalEarnings;
        
      } catch (e) {
        console.warn("Failed to load real-time stats", e);
      }
    }

    function openPayoutModal() { document.getElementById('payout-overlay').classList.add('show'); }
    function closePayoutModal() { document.getElementById('payout-overlay').classList.remove('show'); }

    function togglePayFields() {
      const method = document.getElementById('pay-method').value;
      document.getElementById('fields-upi').style.display = method === 'upi' ? 'block' : 'none';
      document.getElementById('fields-bank').style.display = method === 'bank' ? 'block' : 'none';
    }

    async function submitPayout() {
      const method = document.getElementById('pay-method').value;
      let isValid = true;
      let detailsString = "";

      if (method === 'upi') {
        const upiVal = document.getElementById('pay-upi').value.trim();
        const upiRegex = /^[a-zA-Z0-9.\-_]+@[a-zA-Z0-9]+$/;
        if (!upiRegex.test(upiVal)) { throwErr('pay-upi', 'err-upi'); isValid = false; }
        else detailsString = `UPI: ${upiVal}`;
      } else {
        const holder = document.getElementById('pay-holder').value.trim();
        const acc = document.getElementById('pay-acc').value.trim();
        const ifsc = document.getElementById('pay-ifsc').value.trim().toUpperCase();

        if (holder.length < 3) { throwErr('pay-holder', 'err-holder'); isValid = false; }
        if (!/^\d{9,18}$/.test(acc)) { throwErr('pay-acc', 'err-acc'); isValid = false; }
        if (!/^[A-Z]{4}0[A-Z0-9]{6}$/.test(ifsc)) { throwErr('pay-ifsc', 'err-ifsc'); isValid = false; }
        else detailsString = `BANK | Holder: ${holder} | A/c: ${acc} | IFSC: ${ifsc}`;
      }

      if (isValid) {
        document.getElementById('btn-payout').disabled = true;
        document.getElementById('load-payout').style.display = 'block';
        
        try {
          const userStr = localStorage.getItem('kasu_affiliate_user');
          if (!userStr) throw new Error("Not logged in");
          const user = JSON.parse(userStr);
          
          await sb(`affiliates?email=eq.${user.email}`, 'PATCH', {
            payout_method: method,
            payout_details: detailsString
          });

          showToast('✅ Payout request submitted! We will process it shortly.');
          
          setTimeout(() => {
            closePayoutModal();
            document.getElementById('btn-payout').disabled = false;
            document.getElementById('load-payout').style.display = 'none';
          }, 1500);

        } catch(e) {
          showToast('⚠️ Could not submit request. Check connection.');
          document.getElementById('btn-payout').disabled = false;
          document.getElementById('load-payout').style.display = 'none';
        }
      }
    }

    // Run auth check on load
    checkAuth();
  </script>
